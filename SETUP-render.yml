# MOVE THIS FILE to .github/workflows/render.yml to activate CI rendering.
# (GitHub web editor: open this file -> pencil icon -> edit the filename field
#  to .github/workflows/render.yml -> Commit. That's the whole setup.)
name: render-shorts
on:
  push:
    paths-ignore:
      - 'out/**'
      - '*.md'
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core
      - name: Deps
        run: pip install --quiet pillow
      - name: Render all scripts
        run: |
          mkdir -p out
          python3 shorts_factory.py out/pilot.mp4
          for f in scripts/*.json; do
            [ -e "$f" ] || continue
            name=$(basename "$f" .json)
            python3 shorts_factory.py "out/${name}.mp4" "$f"
          done
      - name: Commit results
        run: |
          git config user.name 'shorts-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add out/
          git diff --cached --quiet || git commit -m 'Render videos'
          git push
